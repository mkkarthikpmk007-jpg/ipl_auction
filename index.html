<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHRYX 2K26 - LOGIN</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Specific Styles for Login Page */
        .full-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: #030305; }
        .pink-glow { font-family: 'Syncopate'; color: #db2777; text-shadow: 0 0 20px #db2777; margin-bottom: 5px; font-size: 28px; }
        .subtitle { color: #444; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; }
        
        .mode-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; width: 100%; }
        .gray-btn { background: #1a1a1a !important; border: 1px solid #333 !important; }
        .gray-btn:hover { background: #333 !important; }
    </style>
</head>
<body>

    <div class="full-screen">
        <div class="premium-card">
            <h1 class="pink-glow">AETHRYX 2K26</h1>
            <p class="subtitle">ZETTA CORE ADMIN PANEL</p>
            
            <div id="login-box">
                <input type="password" id="admin-pass" placeholder="Enter Host Key" 
                       style="width: 100%; padding: 18px; border-radius: 15px; background: #000; color: #fff; border: 1px solid #333; text-align: center;">
                <button onclick="checkPass()" class="btn-p">UNLOCK MONITOR</button>
            </div>

            <div id="mode-box" class="hidden">
                <h2 style="font-size: 14px; margin-bottom: 20px; color: #888;">CHOOSE HOSTING MODE</h2>
                <div class="mode-grid">
                    <button onclick="goToHost('play')" class="btn-p">
                        <i class="fa-solid fa-gamepad"></i> HOST WITH PLAYING
                    </button>
                    <button onclick="goToHost('monitor')" class="btn-p gray-btn">
                        <i class="fa-solid fa-desktop"></i> MONITOR ONLY (NO PLAY)
                    </button>
                </div>
                <p style="font-size: 9px; color: #333; margin-top: 30px;">DESIGNED BY MK KARTHIK</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>

    <script>
        // Supabase initialize (Optional here, but good for room creation)
        const _supabase = supabase.createClient('YOUR_URL', 'YOUR_KEY');

        function checkPass() {
            const pass = document.getElementById('admin-pass').value;
            // Neenga kettapola secure key
            if(pass === 'k') {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('mode-box').classList.remove('hidden');
            } else {
                alert("Wrong Key Mapla! Try again.");
            }
        }

        async function goToHost(mode) {
            // Random Room ID generate pannuvom
            const roomCode = Math.random().toString(36).substring(2, 7).toUpperCase();
            
            // Database-la room-ah create pannittu redirect pannuvom
            if(mode === 'play') {
                window.location.href = `host_play.html?room=${roomCode}`;
            } else {
                window.location.href = `host_monitor.html?room=${roomCode}`;
            }
        }
    </script>
</body>
</html>
